<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rock Paper Scissor</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="rockpaperCSS.css">
</head>
<body>

    <h1>Rock<br>Paper<br>Scissor</h1>
    <p class="subtitle">By Kaushik &mdash; v1.0</p>

    <div class="game-panel">
        <div class="buttons">
            <button class="rock">
                <span style="font-size:2rem">🪨</span>
                Rock
            </button>
            <button class="paper">
                <span style="font-size:2rem">📄</span>
                Paper
            </button>
            <button class="scissor">
                <span style="font-size:2rem">✂️</span>
                Scissor
            </button>
        </div>

        <div class="divider"></div>

        <h3 class="score">Score: 0</h3>
        <p class="stats"></p>

        <button class="reset">Reset Score</button>
    </div>

    <script src="rockpaperJS.js"></script>
</body>
</html>
